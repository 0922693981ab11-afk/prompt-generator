<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roly的AI提示詞快速產生器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .scrollbar-thin::-webkit-scrollbar { width: 6px; height: 6px; }
        .scrollbar-thin::-webkit-scrollbar-track { background: transparent; }
        .scrollbar-thin::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        .dark-scrollbar::-webkit-scrollbar-thumb { background: #334155; }
        
        #resizer:hover { background-color: #818cf8; }
        .selection-btn.active {
            border-color: #4f46e5;
            background-color: #4f46e5;
            color: #ffffff;
            font-weight: bold;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        /* Toast Animation */
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        @keyframes fadeOut {
            from { opacity: 1; }
            to { opacity: 0; }
        }
        .toast-enter { animation: slideIn 0.3s ease-out forwards; }
        .toast-leave { animation: fadeOut 0.3s ease-in forwards; }
        
        /* 強制套用新細明體 */
        body {
            font-family: "PMingLiU", "MingLiU", serif !important;
        }
    </style>
</head>
<body class="h-screen bg-slate-100 flex flex-col text-slate-900 overflow-hidden text-base">

    <!-- Header -->
    <header class="shrink-0 p-3 border-b border-slate-200 bg-white z-10 shadow-sm flex items-center justify-between">
        <h1 class="text-xl font-black text-slate-800 flex items-center gap-2">
            <span class="bg-indigo-600 text-white px-2 py-0.5 rounded text-sm tracking-wider shadow-sm">ROLY</span>
            Roly的AI提示詞快速產生器
        </h1>
        <div class="flex items-center gap-4">
            <!-- Visitor Counter -->
            <div class="hidden sm:flex text-sm text-indigo-700 bg-indigo-50 px-3 py-1.5 rounded-full border border-indigo-100 items-center gap-1.5 font-bold shadow-sm">
                <i data-lucide="users" class="w-4 h-4"></i> 總瀏覽人次：<span id="visitor-count">讀取中...</span>
            </div>
            <!-- Developer Info -->
            <a href="mailto:0922693981ab11@gmail.com" class="hidden md:flex text-sm text-slate-500 hover:text-indigo-600 transition-colors items-center gap-1.5 font-medium bg-slate-50 px-2 py-1.5 rounded border border-slate-100">
                <i data-lucide="mail" class="w-4 h-4"></i> 程式開發者：吳啓仲
            </a>
            <!-- Reset Button -->
            <button id="reset-all-btn" class="text-sm font-bold text-red-500 hover:text-red-700 border border-red-100 bg-red-50 px-3 py-1.5 rounded transition-all active:scale-95 uppercase tracking-tighter flex items-center gap-1">
                <i data-lucide="trash-2" class="w-4 h-4"></i> 全部清除
            </button>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-grow flex flex-col lg:flex-row flex-nowrap overflow-hidden lg:p-3 lg:gap-0" id="container">
        
        <!-- Left Panel: Configuration -->
        <div id="left-panel" class="w-full lg:h-full lg:w-auto flex flex-col shrink-0 overflow-hidden lg:border border-slate-200 lg:rounded-l-lg bg-white shadow-sm flex-1 lg:flex-none" style="flex-basis: 60%;">
            <div class="flex-grow overflow-y-auto overflow-x-auto p-3 lg:p-4 scrollbar-thin">
                <div class="min-w-[300px]" id="config-sections">
                    
                    <!-- AI Analysis Section -->
                    <div class="mb-5 p-4 bg-indigo-50 border border-indigo-100 rounded-lg shadow-inner">
                        <h3 class="text-sm font-bold text-indigo-900 uppercase tracking-tight mb-3 flex items-center gap-2">
                            <i data-lucide="sparkles" class="w-5 h-5 text-indigo-600"></i> AI 視覺分析 (上傳參考圖檔或文件)
                        </h3>
                        <div class="flex flex-col sm:flex-row items-center gap-3">
                            <label class="w-full sm:flex-1 cursor-pointer flex items-center justify-center gap-2 border-2 border-dashed border-indigo-200 bg-white rounded-md p-3 hover:border-indigo-400 hover:bg-indigo-50/50 transition-all">
                                <input type="file" id="file-input" class="hidden" accept="image/*,.pdf">
                                <div id="file-display" class="flex flex-col items-center gap-1 text-indigo-400 text-center">
                                    <i data-lucide="upload-cloud" class="w-6 h-6 mb-1"></i>
                                    <span class="text-sm font-bold text-indigo-600">點擊上傳參考圖片、截圖或 PDF</span>
                                    <span class="text-xs text-slate-400 font-normal">支援 PNG, JPG, PDF (單頁佳，最大 5MB)</span>
                                </div>
                            </label>
                            <div class="flex sm:flex-col flex-row gap-2 w-full sm:w-32 shrink-0">
                                <button id="analyze-detailed" class="flex-1 sm:flex-none px-3 py-2 rounded-md text-sm font-bold flex items-center justify-center gap-1.5 transition-all bg-slate-200 text-slate-400 cursor-not-allowed" disabled>
                                    <i data-lucide="search" class="w-4 h-4"></i> 詳細分析
                                </button>
                                <button id="analyze-concise" class="flex-1 sm:flex-none px-3 py-2 rounded-md text-sm font-bold flex items-center justify-center gap-1.5 transition-all bg-slate-200 text-slate-400 cursor-not-allowed" disabled>
                                    <i data-lucide="zap" class="w-4 h-4"></i> 精簡分析
                                </button>
                            </div>
                        </div>
                    </div>

                    <!-- Title Input -->
                    <div class="mb-4">
                        <h3 class="text-sm font-bold text-slate-500 uppercase tracking-tight mb-1.5 flex items-center gap-1"><i data-lucide="heading-1" class="w-4 h-4"></i> 0. 封面標題</h3>
                        <input type="text" id="title-input" placeholder="輸入要呈現的標題..." class="w-full px-3 py-2 rounded border border-slate-200 bg-slate-50 text-base outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 focus:bg-white transition-all">
                    </div>

                    <!-- Clear Selections -->
                    <div class="mb-5 pt-1">
                        <button id="clear-selections-btn" class="w-full text-sm font-bold bg-slate-800 hover:bg-slate-900 text-white py-2 rounded transition-all active:scale-[0.98] flex items-center justify-center gap-2 shadow-sm uppercase tracking-wider">
                            <i data-lucide="rotate-ccw" class="w-4 h-4"></i> 重新選擇所有按鈕
                        </button>
                    </div>

                    <!-- Dynamic Selection Groups will be injected here -->
                    <div id="selection-groups-container" class="space-y-5"></div>
                    
                    <!-- Custom Notes -->
                    <div class="mt-6 pt-4 border-t border-slate-100">
                        <h3 class="text-sm font-bold text-slate-500 uppercase mb-1.5 flex items-center gap-1"><i data-lucide="pen-line" class="w-4 h-4"></i> 9. 自訂需求 (AI 分析結果也會填入此處)</h3>
                        <textarea id="custom-notes-input" placeholder="在此輸入自訂需求、額外細節備註，或由 AI 自動填入分析結果..." class="w-full h-32 p-3 rounded border border-slate-200 bg-slate-50 text-base outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 focus:bg-white transition-all resize-y shadow-inner"></textarea>
                    </div>
                </div>
            </div>
        </div>

        <!-- Resizer (Hidden on Mobile) -->
        <div id="resizer" class="hidden lg:flex w-1.5 h-full cursor-col-resize transition-colors items-center justify-center shrink-0 bg-slate-200 group">
            <div class="w-[1px] h-16 bg-slate-400 group-hover:bg-white rounded-full transition-colors"></div>
        </div>

        <!-- Right Panel: Output -->
        <div id="right-panel" class="h-[40vh] lg:h-full lg:flex-1 min-w-0 flex flex-col lg:border border-t-4 border-t-indigo-500 lg:border-t-0 lg:border-slate-800 lg:rounded-r-lg shadow-xl bg-slate-900 shrink-0 lg:shrink">
            <div class="px-4 py-3 bg-slate-800 flex justify-between items-center border-b border-slate-700 shrink-0">
                <span class="text-sm text-indigo-300 font-mono tracking-widest flex items-center gap-2"><i data-lucide="terminal" class="w-4 h-4"></i> PROMPT OUTPUT</span>
                <button id="copy-btn" class="text-sm font-bold bg-indigo-600 hover:bg-indigo-500 text-white px-4 py-1.5 rounded transition-all active:scale-95 shadow-md uppercase flex items-center gap-1.5">
                    <i data-lucide="copy" class="w-4 h-4"></i> 建立副本 (複製)
                </button>
            </div>
            <div class="p-4 lg:p-6 overflow-y-auto flex-grow font-mono text-base sm:text-lg text-indigo-100/90 leading-relaxed scrollbar-thin dark-scrollbar">
                <pre id="prompt-output" class="whitespace-pre-wrap"></pre>
            </div>
        </div>
    </main>

    <!-- Custom Modal for Reset Confirmation -->
    <div id="confirm-modal" class="hidden fixed inset-0 bg-slate-900/40 z-50 flex items-center justify-center backdrop-blur-sm transition-opacity opacity-0">
        <div class="bg-white rounded-xl p-6 w-11/12 max-w-sm shadow-2xl border border-slate-200 transform scale-95 transition-transform duration-200" id="modal-content">
            <div class="w-12 h-12 rounded-full bg-red-100 flex items-center justify-center mb-4 mx-auto">
                <i data-lucide="alert-triangle" class="w-6 h-6 text-red-500"></i>
            </div>
            <h3 class="text-lg font-bold text-slate-800 text-center mb-2">確定要全部清除嗎？</h3>
            <p class="text-sm text-slate-500 text-center mb-6">將會清除您目前所有的選項與自訂備註，此動作無法復原。</p>
            <div class="flex justify-center gap-3">
                <button id="cancel-reset-btn" class="px-5 py-2 text-sm font-bold text-slate-600 bg-slate-100 rounded-lg hover:bg-slate-200 transition-colors">取消</button>
                <button id="confirm-reset-btn" class="px-5 py-2 text-sm font-bold text-white bg-red-500 rounded-lg hover:bg-red-600 transition-colors shadow-sm shadow-red-200">確定清除</button>
            </div>
        </div>
    </div>

    <!-- Toast Notification Container -->
    <div id="toast-container" class="fixed bottom-4 right-4 z-50 flex flex-col gap-2 pointer-events-none"></div>

    <!-- Firebase Scripts -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // --- Config Data ---
        const INITIAL_CONFIG = {
            data_types: [
                { id: 'dt-ppt', label: '簡報 (PPT)', prompt: '輸出格式：完整的簡報大綱與各頁詳細內容規劃。' },
                { id: 'dt-img', label: '圖片 (Image)', prompt: '輸出格式：詳細的 AI 繪圖提示詞 (Image Prompt)，精確描述畫面細節與視覺元素。' },
                { id: 'dt-video', label: '影像 (Video)', prompt: '輸出格式：影片腳本 (Video Script)，包含分鏡描述、旁白與畫面動態指示。' },
                { id: 'dt-report', label: '報告 (Report)', prompt: '輸出格式：結構化的專業文字報告，包含摘要、內文與結論。' },
                { id: 'dt-table', label: '資料表 (Table)', prompt: '輸出格式：以 Markdown 表格 (Table) 呈現，清晰對齊各項數據與分類。' },
                { id: 'dt-summary', label: '摘要重點 (Summary)', prompt: '輸出格式：極致精煉的條列式摘要 (Bullet points)，快速抓出核心重點。' },
                { id: 'dt-text', label: '文字 (Text)', prompt: '輸出格式：流暢的純文字敘述，適合文章、貼文或一般閱讀。' },
                { id: 'dt-chart', label: '圖表結構 (Chart)', prompt: '輸出格式：適合轉換為心智圖、流程圖或階層結構圖的文字描述。' }
            ],
            roles: [
                { id: 'student', label: '大學學生', prompt: '你現在是一位充滿熱忱、樂於分享學習心得與校園生活的大學學生。' },
                { id: 'grad-student', label: '研究生', prompt: '你現在是一位講究邏輯、實事求是、擅長文獻回顧與研究分析的研究所學生。' },
                { id: 'engineer', label: '軟體工程師', prompt: '你現在是一位具備扎實技術背景，擅長將複雜系統架構簡化說明的資深軟體工程師。' },
                { id: 'editor', label: '雜誌編輯', prompt: '你現在是一位對文字極度敏感、擅長抓眼球標題與優雅排版敘事的資深雜誌編輯。' },
                { id: 'marketer', label: '行銷企劃', prompt: '你現在是一位敏銳的行銷企劃，擅長抓住受眾痛點、設計具備高轉化率的商業提案。' },
                { id: 'pm', label: '專案經理', prompt: '你現在是一位擅長跨部門溝通、重視時程、風險管控與目標達成的專案經理(PM)。' },
                { id: 'designer', label: '視覺設計師', prompt: '你現在是一位精通色彩心理學與排版美學，對視覺細節極度挑剔的設計大師。' },
                { id: 'expert', label: '領域專家', prompt: '你現在是一位在此領域擁有超過 20 年經驗，見解獨到且具備高度權威的專家。' },
            ],
            infographics: [
                { id: 't1', label: '模板 1 (抽象幾何)', prompt: '生成一個高品質的抽象背景簡報，使用深藍色和金屬金色漸層作為主色調，融入微妙的幾何前景紋理來增加視覺深度，添加流暢線條覆蓋以營造半透明的現代感，在側設計深色空間來平衡布局，提供電影般的燈光效果，包括柔和的陰影和高光，讓整體呈現時尚企業美學，支持8K解析度，採用最小主義設計原則，避免過多元素，每張幻燈片保持乾淨簡潔，比例為16:9，適合橫向投影，並確保文字與圖形完美對齊。' },
                { id: 't2', label: '模板 2 (黏土動畫)', prompt: '生成一個完整的黏土定格動畫風格簡報，讓每張幻燈片呈現活潑的黏土模型效果，包括色彩豐富的黏土材質（如紅、藍、綠等鮮豔顏色）、生動的角色或元素（如跳躍、旋轉的動態姿態），背景使用柔軟的黏土紋理，文字以手捏黏土字體呈現，每頁包含小標題序列來解釋內容，確保整體風格可愛且互動性強，支持高解析度輸出。' },
                { id: 't3', label: '模板 3 (漫畫風格)', prompt: '生成一個完整的漫畫風格簡報，使用白色背景、黑色文字作為基底，每頁以現代日本漫畫風格解釋內容，包括生動的漫畫面板布局（如多格漫畫格子）、角色對話泡泡（圓形或矩形泡泡）、動感線條（如速度線或爆發效果）和表情符號（如汗珠或星星），讓敘述更具故事性，顏色使用鮮豔的調色板（如紅藍黃為輔助色），每張幻燈片設計成連續故事流，支持高解析度，並確保圖文比例平衡以避免擁擠。' },
                { id: 't4', label: '模板 4 (教室黑板)', prompt: '創建一個深綠色「黑板」設計的完整簡報，使用白色、黃色和粉紅色手寫粉筆文字，讓每張幻燈片模擬真實教室黑板效果，包括輕微的擦拭痕跡、隨意塗鴉元素（如箭頭或圓圈）、燈泡或小的手繪氛圍，背景紋理模仿粉筆灰塵，文字大小多樣化以強調重點，加入黑板邊框和橡皮擦效果，結構包括開場介紹、主要內容和總結，讓整體風格輕鬆教育化，支持高解析度輸出，並確保文字清晰不模糊。' },
                { id: 't5', label: '模板 5 (復古像素)', prompt: '創建一個像素藝術復古遊戲風格的簡報，使用8位元色調如紅色、藍色和綠色方塊，每張幻燈片模擬老派電玩畫面，包括像素化角色、磚塊背景紋理、遊戲圖示如金幣或跳躍人物，讓內容以關卡面板布局呈現，文字使用像素字體，加入過框效果如遊戲邊界或分數欄，營造懷舊且趣味的氛圍，支持高解析度輸出，並確保文字清晰不模糊。' },
                { id: 't6', label: '模板 6 (高階商務)', prompt: '生成一份商務提案簡報。風格為『現代扁平化設計』，背景白色，主色調為深藍色。結構要求：\n一、首頁：標題與副標題\n二、目錄\n三、核心問題與痛點（條列式）\n四、解決方案概述\n五、詳細步驟（每頁一個重點，配合關鍵字）\n六、預期效益與指標(KPI)\n七、總結與下一步行動(CTA)\n文字需精簡，以視覺化為主。' },
                { id: 't7', label: '模板 7 (學術研究)', prompt: '製作一份『資訊圖表風格』的報告簡報。背景為淺灰色，使用粗體深色字體。結構要求：\n一、研究主題\n二、研究背景與目的\n三、文獻回顧\n四、研究方法\n五、研究結果與數據分析（請文字結構化，強調數據）\n六、討論\n七、結論與建議\n八、參考文獻\n務必將複雜資料轉化為清晰條列。' },
                { id: 't8', label: '模板 8 (創意海報)', prompt: '製作成『創意海報風格』的提案簡報。色彩活潑、層次分明，重點強調視覺吸引力。結構要求：\n一、概念故事 (Hook)\n二、行銷洞察\n三、創意亮點\n四、執行方案與情境模擬\n五、預算與時程\n六、結尾畫面。' },
                { id: 't9', label: '模板 9 (工程健檢)', prompt: '【專案文件分析與健檢範本】\n請根據專案特性進行評估：\n1.缺漏分析：工程(如水電/土建/裝修)範本中是否漏掉關鍵技術規範或驗收標準？\n2.風險檢視：合約條款關於『工期延宕』、『追加減預算』與『保固責任』規定是否嚴謹？\n3.在地適法性：是否有不符合目前工程實務或最新法規(如勞安/環保)？\n4.明確度優化：哪些條文易生歧義導致結算爭議？請提供具體修正建議。' },
                { id: 't10', label: '模板 10 (玻璃擬物)', prompt: '採用 Glassmorphism (玻璃擬物化) 設計風格，帶有微立體感的半透明磨砂卡片設計，背景為柔和的流體漸層色，光影邊緣清晰，適合呈現科技與前衛主題，圖文資訊分離明確。' },
                { id: 't11', label: '模板 11 (極簡日系)', prompt: '採用極簡的日系無印風格，使用大量的留白與低飽和度的木質色調或大地色，排版注重呼吸感與不對稱平衡，適合文青或生活風格的內容呈現。' },
                { id: 't12', label: '模板 12 (暗黑科技)', prompt: '設計一個暗黑科技風格版型，以深邃的純黑色或暗夜藍為基底，搭配螢光藍、霓虹紫的發光線條與網格元素，營造出強烈的未來感與賽博龐克氛圍。' },
                { id: 't13', label: '模板 13 (動態波浪)', prompt: '背景加入流暢的幾何波浪或液態形狀 (Liquid shapes)，使用鮮豔的漸層色彩組合，視覺帶有動態與活力感，能有效吸引年輕受眾目光，適合創意提案。' },

            const toast = document.createElement('div');
            const bgClass = type === 'success' ? 'bg-emerald-500' : (type === 'error' ? 'bg-red-500' : 'bg-slate-800');
            const icon = type === 'success' ? 'check-circle' : (type === 'error' ? 'alert-circle' : 'info');
            
            toast.className = `toast-enter flex items-center gap-2 px-4 py-2.5 rounded-lg text-white font-bold text-xs shadow-lg pointer-events-auto ${bgClass}`;
            toast.innerHTML = `<i data-lucide="${icon}" class="w-4 h-4"></i> <span>${message}</span>`;
            
            toastContainer.appendChild(toast);
            lucide.createIcons({ root: toast });

            setTimeout(() => {
                toast.classList.replace('toast-enter', 'toast-leave');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        };

        const showModal = () => {
            confirmModal.classList.remove('hidden');
            setTimeout(() => {

                confirmModalContent.classList.remove('scale-95');
                confirmModalContent.classList.add('scale-100');
            }, 10);
        };

            confirmModal.classList.add('opacity-0');

                return `\n# ${titleLabel}\n${selection.prompt}\n`;
            };

                        const swatchContainer = document.createElement('div');
                        swatchContainer.className = 'flex gap-1 mt-1 opacity-90';
                        opt.swatches.forEach(c => {
                            const swatch = document.createElement('div');
                            swatch.className = 'w-3 h-3 rounded-full border border-black/10 shadow-sm';
                            swatch.style.backgroundColor = c;
                            swatchContainer.appendChild(swatch);
                        });
                        btn.appendChild(swatchContainer);
                    }

                    btn.onclick = () => {
                        if (group.isMulti) {
                            const index = selections.notes.findIndex(n => n.id === opt.id);
                            if (index > -1) selections.notes.splice(index, 1);
                            else selections.notes.push(opt);
                        } else {
                            selections[stateKey] = selections[stateKey]?.id === opt.id ? null : opt;
                        }
                        updateStateAndRender();
                    };
                    grid.appendChild(btn);
                });
                groupEl.appendChild(grid);
                selectionGroupsContainer.appendChild(groupEl);
            });
            lucide.createIcons({ root: selectionGroupsContainer });
        };

        const analyzeSlide = async (mode = 'detailed') => {
            const file = fileInput.files[0];
            if (!file || analyzing) return;
            
            if (file.size > 4.5 * 1024 * 1024) {
                showToast('檔案過大！請上傳小於 4.5MB 的檔案', 'error');
                return;
            }

            if (!apiKey) {
                showToast('系統未設定 Gemini API 金鑰', 'error');
                return;
            }
            
            analyzing = true;
            analyzeDetailedBtn.disabled = true;
            analyzeConciseBtn.disabled = true;
            const originalDetailedText = analyzeDetailedBtn.innerHTML;
            const originalConciseText = analyzeConciseBtn.innerHTML;
            
            if(mode === 'detailed') analyzeDetailedBtn.innerHTML = '<i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i> 處理中...';
            else analyzeConciseBtn.innerHTML = '<i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i> 處理中...';
            lucide.createIcons();

            try {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onloadend = async () => {
                    const base64Data = reader.result.split(',')[1];
                    let promptStr = mode === 'detailed'
                        ? "你是一位專業的視覺分析師。請詳細分析這份投影片（或圖片內容）的視覺設計元素，包括配色方案、排版邏輯、字體特點以及整體的視覺氛圍。請以「條列式」的方式呈現分析結果，並將最關鍵的核心重點放在最前面。分析結果應是一段可以用於 AI 內容生成的「提示詞描述」，且必須使用「繁體中文」撰寫。請直接回傳分析後的條列內容，不要有額外的開場白或結論。"
                        : "你是一位專業的視覺分析師。請以「極其精煉」的條列式文字，快速分析這張投影片的風格與排版核心。排除贅字，總字數控制在 100 字以內，使用「繁體中文」。請直接回傳核心條列內容。";

                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{
                                parts: [
                                    { text: promptStr },
                                    { inlineData: { mimeType: file.type || 'image/jpeg', data: base64Data } }
                                ]
                            }]
                        })
                    });

                    if (!response.ok) throw new Error(`API Error: ${response.status}`);
                    
                    const result = await response.json();
                    const analysisText = result.candidates?.[0]?.content?.parts?.[0]?.text;
                    
                    if (analysisText) {
                        const header = mode === 'detailed' ? "【 AI 視覺深度分析結果 】" : "【 AI 風格速寫結果 】";
                        customNotes = (customNotes ? customNotes + "\n\n" : "") + header + "\n" + analysisText.trim();
                        customNotesInput.value = customNotes;
                        updateStateAndRender();
                        showToast('AI 分析完成！已填入自訂需求區', 'success');
                    } else {
                        throw new Error('No text in response');
                    }
                    finishAnalysis();
                };
            } catch (err) {
                console.error("分析失敗:", err);
                showToast('分析失敗，請檢查檔案或稍後再試', 'error');
                finishAnalysis();
            }

            function finishAnalysis() {
                analyzing = false;
                analyzeDetailedBtn.disabled = false;
                analyzeConciseBtn.disabled = false;
                analyzeDetailedBtn.innerHTML = originalDetailedText;
                analyzeConciseBtn.innerHTML = originalConciseText;
                lucide.createIcons();
            }
        };

        // --- Event Listeners ---

        titleInput.oninput = (e) => { title = e.target.value; buildPrompt(); saveState(); };
        customNotesInput.oninput = (e) => { customNotes = e.target.value; buildPrompt(); saveState(); };

        fileInput.onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                const iconType = file.type.includes('pdf') ? 'file-text' : 'image';
                fileDisplay.innerHTML = `<i data-lucide="${iconType}" class="w-6 h-6 text-indigo-500 mb-1"></i><span class="text-sm font-bold truncate max-w-[200px] text-indigo-700">${file.name}</span><span class="text-xs text-indigo-400">${(file.size / 1024 / 1024).toFixed(2)} MB</span>`;
                analyzeDetailedBtn.className = ANALYZE_DETAILED_ENABLED_CLASS;
                analyzeConciseBtn.className = ANALYZE_CONCISE_ENABLED_CLASS;
                analyzeDetailedBtn.disabled = false;
                analyzeConciseBtn.disabled = false;
            } else {
                fileDisplay.innerHTML = `<i data-lucide="upload-cloud" class="w-6 h-6 mb-1"></i><span class="text-sm font-bold text-indigo-600">點擊上傳參考圖片、截圖或 PDF</span><span class="text-xs text-slate-400 font-normal">支援 PNG, JPG, PDF (最大 5MB)</span>`;
                analyzeDetailedBtn.className = ANALYZE_BTN_DISABLED_CLASS;
                analyzeConciseBtn.className = ANALYZE_BTN_DISABLED_CLASS;
                analyzeDetailedBtn.disabled = true;
                analyzeConciseBtn.disabled = true;
            }
            lucide.createIcons();
        };

        analyzeDetailedBtn.onclick = () => analyzeSlide('detailed');
        analyzeConciseBtn.onclick = () => analyzeSlide('concise');

        copyBtn.onclick = () => {
            if (!promptOutput.textContent.trim()) {
                showToast('沒有可複製的內容', 'error');
                return;
            }

            const el = document.createElement('textarea');
            el.value = promptOutput.textContent;
            document.body.appendChild(el);
            el.select();
            
            try {
                document.execCommand('copy');
                showToast('提示詞已複製到剪貼簿！', 'success');
                
                const originalHtml = copyBtn.innerHTML;
                copyBtn.innerHTML = `<i data-lucide="check" class="w-4 h-4"></i> 已複製`;
                copyBtn.classList.replace('bg-indigo-600', 'bg-emerald-500');
                copyBtn.classList.replace('hover:bg-indigo-500', 'hover:bg-emerald-400');
                lucide.createIcons({ root: copyBtn });
                
                setTimeout(() => {
                    copyBtn.innerHTML = originalHtml;
                    copyBtn.classList.replace('bg-emerald-500', 'bg-indigo-600');
                    copyBtn.classList.replace('hover:bg-emerald-400', 'hover:bg-indigo-500');
                    lucide.createIcons({ root: copyBtn });
                }, 2000);
            } catch (err) {
                showToast('複製失敗，請手動圈選複製', 'error');
            }
            document.body.removeChild(el);
        };

        resetAllBtn.onclick = showModal;
        cancelResetBtn.onclick = hideModal;
        
        confirmResetBtn.onclick = () => {
            title = '';
            customNotes = '';
            selections = getInitialSelections();
            titleInput.value = '';
            customNotesInput.value = '';
            fileInput.value = '';
            fileDisplay.innerHTML = `<i data-lucide="upload-cloud" class="w-6 h-6 mb-1"></i><span class="text-sm font-bold text-indigo-600">點擊上傳參考圖片、截圖或 PDF</span><span class="text-xs text-slate-400 font-normal">支援 PNG, JPG, PDF (單頁佳，最大 5MB)</span>`;
            
            analyzeDetailedBtn.disabled = true;
            analyzeConciseBtn.disabled = true;
            analyzeDetailedBtn.className = ANALYZE_BTN_DISABLED_CLASS;
            analyzeConciseBtn.className = ANALYZE_BTN_DISABLED_CLASS;
            
            updateStateAndRender();
            hideModal();
            showToast('已清除所有設定', 'info');
        };

        clearSelectionsBtn.onclick = () => {
            selections = getInitialSelections();
            updateStateAndRender();
            showToast('已取消按鈕選取', 'info');
        };

        // --- Resizer Logic ---
        const resizer = document.getElementById('resizer');
        const leftPanel = document.getElementById('left-panel');
        const container = document.getElementById('container');
        let isResizing = false;

        resizer.onmousedown = (e) => {
            isResizing = true;
            document.body.style.cursor = 'col-resize';
            document.body.style.userSelect = 'none';
        };

        document.onmousemove = (e) => {
            if (!isResizing) return;
            const rect = container.getBoundingClientRect();
            let newWidth = ((e.clientX - rect.left) / rect.width) * 100;
            if (newWidth >= 30 && newWidth <= 80) leftPanel.style.flexBasis = `${newWidth}%`;
        };

        document.onmouseup = () => {
            if(isResizing) {
                isResizing = false;
                document.body.style.cursor = 'default';
                document.body.style.userSelect = 'auto';
            }
        };

        // --- Auth & Initialize ---
        const init = async () => {
            if (!auth) {
                renderSelections();
                buildPrompt();
                return;
            }

            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                await signInWithCustomToken(auth, __initial_auth_token);
            } else {
                await signInAnonymously(auth);
            }

            onAuthStateChanged(auth, async (u) => {
                user = u;
                if (!user) return;
                
                // Initialize and update visitor counter
                try {
                    const statsRef = doc(db, 'artifacts', appId, 'public', 'data', 'stats', 'global');
                    const statsSnap = await getDoc(statsRef);
                    let currentCount = 0;
                    if (statsSnap.exists()) {
                        currentCount = statsSnap.data().count || 0;
                    }
                    currentCount += 1;
                    await setDoc(statsRef, { count: currentCount }, { merge: true });
                    const counterElement = document.getElementById('visitor-count');
                    if(counterElement) counterElement.innerText = currentCount.toLocaleString();
                } catch (e) {
                    console.error("Counter increment failed:", e);
                    const counterElement = document.getElementById('visitor-count');
                    if(counterElement) counterElement.innerText = "---";
                }

                try {
                    const docRef = doc(db, 'artifacts', appId, 'users', user.uid, 'settings', 'config');
                    const snap = await getDoc(docRef);
                    if (snap.exists()) {
                        const data = snap.data();
                        if (data.selections) selections = data.selections;
                        if (data.title) { title = data.title; titleInput.value = title; }
                        if (data.customNotes) { customNotes = data.customNotes; customNotesInput.value = customNotes; }
                    }
                } catch (e) { 
                    console.error("Load failed from Firestore, using defaults.", e); 
                }
                
                renderSelections();
                buildPrompt();
            });
        };

        init();
    </script>
</body>
</html>
